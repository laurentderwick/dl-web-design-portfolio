<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Sono", sans-serif;
      }
      .pricing-container {
        display: flex;
       flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px;
        padding: 20px solid #ccccccc0;
    
      }
      .pricing-plan {
      flex: 1;
      max-width: 400px;
      padding: 20px;
      background-color: #f2f2f2;
      border-radius: 5px;
      text-align: center;
    }
      
      .plan-title, .plan-price {
        text-align: center;
        font-weight: 700;
      }

      .plan-title {
        font-size: 0.8em;
        margin-top: 20px; /* Spacing between title and border*/
      }
      .plan-price {
        font-size: 1.8em;
        margin: 10px 0; /* Spacing between price and title/features */
      }
      .plan-features {
         list-style-type: none; 
          font-weight: 200;
          font-size: smaller;
          /* Disable default list styling  (bullet Points rmeoval) */
      }

      .plan-button {              /* Styling all sign up buttons from each pricing plan class(Box)*/
        color: white;
        background-color: coral;
        border: none;
        padding: 10px 10px;
        border-radius: 7px;
        cursor: pointer;
        margin: 20px auto;
        padding: auto;
        display: flex
      
         /* Center the button horizontally and add spacing from features */
      }

       



      /* Hint: What can you do with a media query and flexbox? */
      @media  (max-width: 1250px) {
       
      }
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
